name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PROJECT_PATH: ShoppingPlatform/ShoppingPlatform.csproj
      PUBLISH_DIR: ${{ github.workspace }}/publish
      BACKEND_SERVICE_NAME: ${{ secrets.BACKEND_SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify .NET on runner
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Validate required variables
        run: |
          test -n "$BACKEND_SERVICE_NAME" || (echo "Missing secret: BACKEND_SERVICE_NAME" && exit 1)

      - name: Resolve deployment path from service
        run: |
          DEPLOY_PATH="$(systemctl show "$BACKEND_SERVICE_NAME" --property=WorkingDirectory --value)"
          test -n "$DEPLOY_PATH" || (echo "Could not resolve WorkingDirectory for service: $BACKEND_SERVICE_NAME" && exit 1)
          echo "Resolved deploy path: $DEPLOY_PATH"
          echo "BACKEND_DEPLOY_PATH=$DEPLOY_PATH" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish
        run: dotnet publish "$PROJECT_PATH" -c Release -o "$PUBLISH_DIR"

      - name: Deploy files to service directory
        run: |
          sudo mkdir -p "$BACKEND_DEPLOY_PATH"
          sudo rsync -az --delete "$PUBLISH_DIR"/ "$BACKEND_DEPLOY_PATH"/
          sudo test -f "$BACKEND_DEPLOY_PATH/ShoppingPlatform.dll" || (echo "Deployed DLL not found at $BACKEND_DEPLOY_PATH" && exit 1)
          sudo stat "$BACKEND_DEPLOY_PATH/ShoppingPlatform.dll"

      - name: Restart backend service
        run: |
          sudo systemctl restart "$BACKEND_SERVICE_NAME"
          sudo systemctl status "$BACKEND_SERVICE_NAME" --no-pager
