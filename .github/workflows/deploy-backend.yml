name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PROJECT_PATH: ShoppingPlatform/ShoppingPlatform.csproj
      PUBLISH_DIR: ./publish
      BACKEND_SERVICE_NAME: ${{ secrets.BACKEND_SERVICE_NAME }}
      BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify .NET on runner
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Validate deployment variables
        run: |
          test -n "$BACKEND_SERVICE_NAME" || (echo "Missing secret: BACKEND_SERVICE_NAME" && exit 1)
          test -n "$BACKEND_DEPLOY_PATH" || (echo "Missing secret: BACKEND_DEPLOY_PATH" && exit 1)

      - name: Restore
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish
        run: dotnet publish "$PROJECT_PATH" -c Release -o "$PUBLISH_DIR"

      - name: Deploy files to service directory
        run: |
          sudo mkdir -p "$BACKEND_DEPLOY_PATH"
          sudo rsync -az --delete "$PUBLISH_DIR"/ "$BACKEND_DEPLOY_PATH"/

      - name: Restart backend service
        run: |
          sudo systemctl restart "$BACKEND_SERVICE_NAME"
          sudo systemctl status "$BACKEND_SERVICE_NAME" --no-pager
